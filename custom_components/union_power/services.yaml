import_range:
  name: Import Usage Range
  description: Import historical usage data for a custom date range
  fields:
    start_date:
      name: Start Date
      description: Start date (YYYY-MM-DD)
      example: "2026-01-01"
      required: true
      selector:
        date: {}
    end_date:
      name: End Date
      description: End date (YYYY-MM-DD)
      example: "2026-03-01"
      required: true
      selector:
        date: {}

fill_all_stats:
  name: Fill All Statistics
  description: Rewrite price data on all existing statistics (requires cost_per_kwh to be set)

trigger_fetch:
  name: Trigger Fetch
  description: Manually trigger the normal daily fetch cycle (login, fetch new data, insert stats)
